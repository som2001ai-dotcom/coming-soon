<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tidal Minds — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #3ee6c4;
    --teal-mid: #1db8c8;
    --navy: #07131f;
    --white: #f0f6fc;
    --muted: #6b93b0;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--navy);
    color: var(--white);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* subtle grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 160px;
    opacity: 0.4;
  }

  .page {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }

  /* glow ring behind logo */
  .logo-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 44px;
  }

  .logo-wrap::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 220px; height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(62,230,196,0.14) 0%, transparent 70%);
    animation: pulse 3.5s ease-in-out infinite;
  }

  .logo-wrap img {
    position: relative;
    width: 160px;
    filter: drop-shadow(0 0 22px rgba(62,230,196,0.45));
    opacity: 0;
    animation: fadeUp 1.1s 0.2s cubic-bezier(.22,1,.36,1) forwards;
  }

  /* thin teal rule */
  .rule {
    width: 56px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--teal), transparent);
    margin: 0 auto 36px;
    opacity: 0;
    animation: fadeUp 1s 0.6s forwards;
  }

  .eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s 0.5s forwards;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5.5vw, 4.6rem);
    line-height: 1.12;
    letter-spacing: 0.02em;
    max-width: 720px;
    opacity: 0;
    animation: fadeUp 1.1s 0.75s cubic-bezier(.22,1,.36,1) forwards;
  }

  h1 em {
    font-style: italic;
    color: var(--teal);
  }

  .sub {
    margin-top: 28px;
    font-size: 0.88rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 1s forwards;
  }

  /* scroll line at bottom */
  .scroll-line {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 52px;
    background: linear-gradient(to bottom, var(--teal), transparent);
    opacity: 0;
    animation: fadeUp 1s 1.4s forwards, scrollPulse 2.4s 2.4s ease-in-out infinite;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%,100% { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    50%      { transform: translate(-50%,-50%) scale(1.12); opacity: 0.5; }
  }
  @keyframes scrollPulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  @media (max-width: 600px) {
    .logo-wrap img { width: 120px; }
    h1 { font-size: clamp(1.7rem, 7vw, 2.8rem); }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="page">
  <div class="logo-wrap">
    <img src="https://github.com/som2001ai-dotcom/coming-soon/blob/main/Logo-removebg-preview.png?raw=true" alt="Tidal Minds"/>
  </div>

  <p class="eyebrow">Coming Soon</p>
  <div class="rule"></div>

  <h1>Clarity starts where<br/><em>conventional thinking</em> ends.</h1>

  <div class="scroll-line"></div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let t = 0;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function wave(yFrac, amp, waveLen, speed, colorStop1, colorStop2, alpha) {
    const yBase = canvas.height * yFrac;
    const grad = ctx.createLinearGradient(0, yBase - amp, 0, canvas.height);
    grad.addColorStop(0, colorStop1);
    grad.addColorStop(1, colorStop2);

    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x += 2) {
      const y = yBase
        + Math.sin((x / waveLen) + t * speed) * amp
        + Math.sin((x / (waveLen * 0.55)) + t * speed * 1.4) * (amp * 0.38);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.closePath();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // deep background gradient
    const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bg.addColorStop(0, '#07131f');
    bg.addColorStop(1, '#09202f');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // layered waves
    wave(0.70, 36, 420, 0.32, 'rgba(13,60,90,0.9)',  'rgba(7,19,31,0)',   0.8);
    wave(0.76, 28, 340, 0.45, 'rgba(10,46,70,0.85)', 'rgba(7,19,31,0)',   0.7);
    wave(0.82, 20, 270, 0.60, 'rgba(29,184,200,0.18)','rgba(7,19,31,0)',  0.6);
    wave(0.88, 14, 210, 0.75, 'rgba(62,230,196,0.08)','rgba(7,19,31,0)',  0.5);

    t += 0.007;
    requestAnimationFrame(frame);
  }
  frame();
</script>
</body>
</html>
